<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- fontawsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- Favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- DaisyUI & Taiwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="flex justify-between w-[1440px] mx-auto mt-3">
      <div class="flex items-center gap-1.5">
        <img class="w-8" src="./assets/github-logo.png" alt="" />
        <h1 class="font-bold text-2xl">GitHub Issue Tracker</h1>
      </div>
      <div class="gap-2">
        <input
          type="text"
          placeholder="Search issue…"
          class="border border-gray-300 rounded-md py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button class="btn bg-[#4A00FF] text-white">
          <i class="fa-solid fa-plus"></i>New Issue
        </button>
      </div>
    </header>

    <section class="w-[1140px] mx-auto mt-6">
      <div class="tab-section shadow-gray-300 shadow-md rounded-box p-3">
        <button class="btn btn-primary">All</button>
        <button class="btn btn-ghost">Open</button>
        <button class="btn btn-ghost">Closed</button>
      </div>

      <div
        class="total-issue-section mt-5 flex items-center gap-2 justify-between shadow-gray-300 shadow-md rounded-box p-3"
      >
        <div class="flex h-full items-center gap-2">
          <div>
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2>50 issues</h2>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span class="bg-green-500 rounded-full w-2 h-2"></span>
          <p>Open</p>
          <span class="bg-purple-500 rounded-full w-2 h-2"></span>
          <p>Closed</p>
        </div>
      </div>

      <div id="card-container" class="grid grid-cols-4 gap-4 mt-5 space-y-7">
        <div  class="shadow-gray-300 shadow-md rounded-box p-3">
          <!-- Issues will be dynamically added here -->
           <div class="flex justify-between items-center">
            <img src="./assets/Open-Status.png" alt="">
            <button class="border-2 border-red-300 text-red-500 rounded-2xl  p-1 bg-red-100" >High</button>
           </div>
          <h1>Fix navigation menu on mobile devices</h1>
          <p>
            The navigation menu doesn't collapse properly on mobile devices...
          </p>
          <div>
            <button class="border-2 border-red-300 text-red-500 rounded-2xl  p-1 bg-red-100"><i class="fa-solid fa-bug gap-2"></i>Bug</button>
            <button class="border-2 border-yellow-300 text-yellow-500 rounded-2xl p-1 bg-yellow-100"><i class="fa-regular fa-life-ring"></i>help wanted</button>
          </div>
          <hr>
          <p>#1 by john_doe</p>
          <p>1/15/2024</p>
        </div>
      </div>

      <!-- loading spinner -->
       <div id="LoadingSpinner" class="h-[60vh] hidden flex justify-center items-center">
        <span class="loading loading-spinner loading-xl"></span>
       </div>

      
    </section>

    <!-- javascript -->
     <!-- <script src="./JS file/home.js"></script> -->
    <script src="./home.js"></script>
  </body>
</html>
